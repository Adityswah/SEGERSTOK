services:
  postgres:
    image: postgres:16-alpine
    container_name: segerstok-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sotostock
      TZ: Asia/Jakarta
    ports:
      - "55432:5432"
    volumes:
      - segerstok_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sotostock"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  segerstok_postgres_data:
