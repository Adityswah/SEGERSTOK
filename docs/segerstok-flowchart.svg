<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1350" viewBox="0 0 1800 1350">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f2a22"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1a1612" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #fbfaf7; }
      .title { font: 800 42px Arial, sans-serif; fill: #1a1612; }
      .subtitle { font: 500 19px Arial, sans-serif; fill: #6c6256; }
      .section { font: 800 24px Arial, sans-serif; fill: #1a1612; }
      .box { fill: #ffffff; stroke: #d7c8a3; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .box2 { fill: #fff7df; stroke: #b8962e; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .box3 { fill: #eef7f0; stroke: #4f8c63; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .box4 { fill: #eef3ff; stroke: #5575c9; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .box5 { fill: #fff0ee; stroke: #cb665b; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .db { fill: #f2eee6; stroke: #8f7d62; stroke-width: 2; filter: url(#shadow); }
      .text { font: 700 18px Arial, sans-serif; fill: #1a1612; }
      .small { font: 500 15px Arial, sans-serif; fill: #5d554b; }
      .tiny { font: 500 13px Arial, sans-serif; fill: #6c6256; }
      .line { stroke: #2f2a22; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #7b6e5b; stroke-width: 2.2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .lane { fill: none; stroke: #e6dcc7; stroke-width: 2; rx: 26; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1350"/>

  <text class="title" x="80" y="78">SEGERSTOK - Full Stack Application Flow</text>
  <text class="subtitle" x="80" y="112">Next.js frontend, Better Auth role access, API routes, PostgreSQL/Supabase, AI pipeline, dan Owner AI Bot</text>

  <rect class="lane" x="60" y="150" width="510" height="900" rx="26"/>
  <rect class="lane" x="630" y="150" width="530" height="900" rx="26"/>
  <rect class="lane" x="1220" y="150" width="520" height="900" rx="26"/>
  <rect class="lane" x="60" y="1090" width="1680" height="190" rx="26"/>

  <text class="section" x="90" y="193">1. Frontend dan Role</text>
  <text class="section" x="660" y="193">2. Backend API dan Transaksi</text>
  <text class="section" x="1250" y="193">3. AI Pipeline dan AI Bot</text>
  <text class="section" x="90" y="1133">4. Database Output</text>

  <rect class="box2" x="130" y="235" width="340" height="82" rx="18"/>
  <text class="text" x="300" y="270" text-anchor="middle">User membuka aplikasi</text>
  <text class="small" x="300" y="295" text-anchor="middle">https://segerstok.vercel.app</text>

  <rect class="box" x="130" y="365" width="340" height="82" rx="18"/>
  <text class="text" x="300" y="400" text-anchor="middle">SotoStockApp</text>
  <text class="small" x="300" y="425" text-anchor="middle">Client component + navigation</text>

  <rect class="box" x="130" y="495" width="340" height="92" rx="18"/>
  <text class="text" x="300" y="530" text-anchor="middle">Better Auth session</text>
  <text class="small" x="300" y="555" text-anchor="middle">Cek login dan role user</text>

  <path class="line" d="M300 317 L300 365"/>
  <path class="line" d="M300 447 L300 495"/>

  <rect class="box3" x="90" y="645" width="205" height="130" rx="18"/>
  <text class="text" x="192" y="682" text-anchor="middle">Owner</text>
  <text class="small" x="192" y="710" text-anchor="middle">Dashboard</text>
  <text class="small" x="192" y="733" text-anchor="middle">Stock, laporan</text>
  <text class="small" x="192" y="756" text-anchor="middle">Prediksi harga, AI Bot</text>

  <rect class="box4" x="335" y="645" width="205" height="130" rx="18"/>
  <text class="text" x="438" y="682" text-anchor="middle">Staff</text>
  <text class="small" x="438" y="710" text-anchor="middle">Kasir / Cheef / Waiters</text>
  <text class="small" x="438" y="733" text-anchor="middle">Stok masuk/keluar</text>
  <text class="small" x="438" y="756" text-anchor="middle">Opname</text>

  <path class="line" d="M300 587 L205 645"/>
  <path class="line" d="M300 587 L425 645"/>

  <rect class="box" x="130" y="840" width="340" height="92" rx="18"/>
  <text class="text" x="300" y="875" text-anchor="middle">Load data UI</text>
  <text class="small" x="300" y="900" text-anchor="middle">apiJson ke API routes</text>

  <path class="line" d="M192 775 L270 840"/>
  <path class="line" d="M438 775 L330 840"/>

  <rect class="box" x="700" y="235" width="390" height="98" rx="18"/>
  <text class="text" x="895" y="270" text-anchor="middle">GET /api/ingredients</text>
  <text class="small" x="895" y="295" text-anchor="middle">Master bahan aktif, kategori, unit, stok</text>
  <text class="tiny" x="895" y="316" text-anchor="middle">Semua role login bisa membaca</text>

  <rect class="box" x="700" y="375" width="390" height="110" rx="18"/>
  <text class="text" x="895" y="410" text-anchor="middle">POST /api/transactions</text>
  <text class="small" x="895" y="435" text-anchor="middle">Input stok masuk atau keluar</text>
  <text class="tiny" x="895" y="456" text-anchor="middle">Insert transaksi + update stok dalam DB transaction</text>

  <rect class="box" x="700" y="525" width="390" height="110" rx="18"/>
  <text class="text" x="895" y="560" text-anchor="middle">POST /api/opname</text>
  <text class="small" x="895" y="585" text-anchor="middle">Data aktual lapangan</text>
  <text class="tiny" x="895" y="606" text-anchor="middle">Validasi khusus tanggal 30 Asia/Jakarta</text>

  <rect class="box" x="700" y="675" width="390" height="110" rx="18"/>
  <text class="text" x="895" y="710" text-anchor="middle">GET /api/price-predictions</text>
  <text class="small" x="895" y="735" text-anchor="middle">Halaman Prediksi Kenaikan Harga</text>
  <text class="tiny" x="895" y="756" text-anchor="middle">AI terbaru, fallback legacy bila kosong</text>

  <rect class="box" x="700" y="825" width="390" height="110" rx="18"/>
  <text class="text" x="895" y="860" text-anchor="middle">Master bahan Owner</text>
  <text class="small" x="895" y="885" text-anchor="middle">POST / PATCH / PUT /api/ingredients</text>
  <text class="tiny" x="895" y="906" text-anchor="middle">Tambah/edit bahan, kategori, unit</text>

  <path class="line" d="M470 872 C560 812 610 290 700 285"/>
  <path class="line" d="M470 885 C575 860 610 430 700 430"/>
  <path class="line" d="M470 898 C575 910 610 580 700 580"/>
  <path class="line" d="M470 911 C575 965 610 730 700 730"/>
  <path class="line" d="M470 924 C575 1010 610 880 700 880"/>

  <rect class="box2" x="1290" y="235" width="370" height="100" rx="18"/>
  <text class="text" x="1475" y="270" text-anchor="middle">AI refresh trigger</text>
  <text class="small" x="1475" y="295" text-anchor="middle">Cron, Owner manual, summary kosong</text>
  <text class="tiny" x="1475" y="316" text-anchor="middle">GET/POST /api/ai/refresh</text>

  <rect class="box2" x="1290" y="380" width="370" height="126" rx="18"/>
  <text class="text" x="1475" y="415" text-anchor="middle">runAiPipeline()</text>
  <text class="small" x="1475" y="442" text-anchor="middle">Ambil sinyal eksternal + static signals</text>
  <text class="small" x="1475" y="466" text-anchor="middle">Baca ingredients dan baseline prediksi</text>
  <text class="tiny" x="1475" y="488" text-anchor="middle">Record start/finish di ai_pipeline_runs</text>

  <rect class="box2" x="1290" y="552" width="370" height="130" rx="18"/>
  <text class="text" x="1475" y="587" text-anchor="middle">Generate AI outputs</text>
  <text class="small" x="1475" y="614" text-anchor="middle">Material risk harian</text>
  <text class="small" x="1475" y="638" text-anchor="middle">Proyeksi stok mingguan</text>
  <text class="small" x="1475" y="662" text-anchor="middle">Rekomendasi beli</text>

  <path class="line" d="M1475 335 L1475 380"/>
  <path class="line" d="M1475 506 L1475 552"/>

  <rect class="box3" x="1260" y="760" width="420" height="150" rx="18"/>
  <text class="text" x="1470" y="797" text-anchor="middle">Owner AI Bot</text>
  <text class="small" x="1470" y="824" text-anchor="middle">POST /api/ai-bot/query</text>
  <text class="small" x="1470" y="848" text-anchor="middle">Baca AI summary + cari bahan terkait</text>
  <text class="small" x="1470" y="872" text-anchor="middle">Jawab stok, prediksi harga, waktu beli, proyeksi</text>
  <text class="tiny" x="1470" y="895" text-anchor="middle">Hanya muncul untuk role Owner</text>

  <path class="dash" d="M1090 730 C1175 720 1200 815 1260 835"/>
  <path class="dash" d="M1475 682 L1470 760"/>

  <rect class="db" x="100" y="1170" width="190" height="68" rx="18"/>
  <text class="text" x="195" y="1200" text-anchor="middle">ingredients</text>
  <text class="tiny" x="195" y="1222" text-anchor="middle">stok, unit, kategori</text>

  <rect class="db" x="320" y="1170" width="210" height="68" rx="18"/>
  <text class="text" x="425" y="1200" text-anchor="middle">stock_transactions</text>
  <text class="tiny" x="425" y="1222" text-anchor="middle">audit stok masuk/keluar</text>

  <rect class="db" x="560" y="1170" width="200" height="68" rx="18"/>
  <text class="text" x="660" y="1200" text-anchor="middle">stock_opname</text>
  <text class="tiny" x="660" y="1222" text-anchor="middle">aktual lapangan</text>

  <rect class="db" x="790" y="1170" width="230" height="68" rx="18"/>
  <text class="text" x="905" y="1200" text-anchor="middle">ai_source_signals</text>
  <text class="tiny" x="905" y="1222" text-anchor="middle">berita/sinyal harga</text>

  <rect class="db" x="1050" y="1170" width="250" height="68" rx="18"/>
  <text class="text" x="1175" y="1200" text-anchor="middle">ai_material_risk_daily</text>
  <text class="tiny" x="1175" y="1222" text-anchor="middle">prediksi harga real</text>

  <rect class="db" x="1330" y="1170" width="210" height="68" rx="18"/>
  <text class="text" x="1435" y="1200" text-anchor="middle">ai_weekly_stock</text>
  <text class="tiny" x="1435" y="1222" text-anchor="middle">proyeksi mingguan</text>

  <rect class="db" x="1570" y="1170" width="130" height="68" rx="18"/>
  <text class="text" x="1635" y="1200" text-anchor="middle">ai_buy</text>
  <text class="tiny" x="1635" y="1222" text-anchor="middle">rekomendasi</text>

  <path class="line" d="M895 333 L220 1170"/>
  <path class="line" d="M895 485 L425 1170"/>
  <path class="line" d="M895 635 L660 1170"/>
  <path class="line" d="M1475 506 C1320 760 1080 1040 905 1170"/>
  <path class="line" d="M1475 682 C1380 835 1250 1010 1175 1170"/>
  <path class="line" d="M1490 682 C1485 850 1455 1020 1435 1170"/>
  <path class="line" d="M1515 682 C1580 850 1630 1030 1635 1170"/>
  <path class="line" d="M1470 910 C1390 1000 1250 1080 1175 1170"/>
  <path class="line" d="M1470 910 C1420 1010 1410 1080 1435 1170"/>
  <path class="line" d="M1470 910 C1535 1000 1590 1080 1635 1170"/>

  <rect x="80" y="1288" width="1640" height="1.5" fill="#d7c8a3"/>
  <text class="tiny" x="80" y="1318">Prinsip data: UI tidak menghitung stok final sendiri; backend melakukan validasi role, schema, rate limit, transaksi database, dan mengembalikan data final ke frontend.</text>
</svg>
