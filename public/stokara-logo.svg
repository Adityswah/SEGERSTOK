<?xml version="1.0" encoding="UTF-8"?>
<svg
  width="500"
  height="500"
  viewBox="0 0 500 500"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="STOKARA Inventory Management Logo"
>
  <title>STOKARA — Inventory Management</title>
  <desc>Minimalist gold diamond fan line art logo for STOKARA inventory management application</desc>

  <defs>
    <style>
      .gl { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .wm {
        font-family: 'Palatino Linotype', 'Palatino', 'Book Antiqua', Georgia, serif;
        letter-spacing: 0.22em;
        fill: #A87C20;
      }
      .ws {
        font-family: 'Palatino Linotype', 'Palatino', 'Book Antiqua', Georgia, serif;
        letter-spacing: 0.42em;
        fill: #B8962E;
      }
    </style>
  </defs>

  <!-- ============================================================ -->
  <!--  DIAMOND FAN MARK                                            -->
  <!--  Top apex : (250, 60)                                        -->
  <!--  Right    : (368, 215)                                       -->
  <!--  Bottom   : (250, 370)   ← all fan lines originate here     -->
  <!--  Left     : (132, 215)                                       -->
  <!-- ============================================================ -->

  <g transform="translate(250, 215)">

    <!-- OUTER DIAMOND FRAME -->
    <line class="gl" x1="-118" y1="0" x2="0"    y2="-155" stroke="#8B6514" stroke-width="1.6" opacity="0.95"/>
    <line class="gl" x1="118"  y1="0" x2="0"    y2="-155" stroke="#8B6514" stroke-width="1.6" opacity="0.95"/>
    <line class="gl" x1="-118" y1="0" x2="0"    y2="155"  stroke="#8B6514" stroke-width="1.6" opacity="0.95"/>
    <line class="gl" x1="118"  y1="0" x2="0"    y2="155"  stroke="#8B6514" stroke-width="1.6" opacity="0.95"/>

    <!-- ── RIGHT LOWER fan (apex→right-lower edge, t = 1/6…5/6) ── -->
    <line class="gl" x1="0" y1="155" x2="19.7"  y2="129.2" stroke="#C9A227" stroke-width="0.70"/>
    <line class="gl" x1="0" y1="155" x2="39.3"  y2="103.3" stroke="#C9A227" stroke-width="0.76"/>
    <line class="gl" x1="0" y1="155" x2="59.0"  y2="77.5"  stroke="#C9A227" stroke-width="0.82"/>
    <line class="gl" x1="0" y1="155" x2="78.7"  y2="51.7"  stroke="#C9A227" stroke-width="0.88"/>
    <line class="gl" x1="0" y1="155" x2="98.3"  y2="25.8"  stroke="#C9A227" stroke-width="0.94"/>

    <!-- ── RIGHT UPPER fan (apex→right-upper edge, t = 1/7…6/7) ── -->
    <line class="gl" x1="0" y1="155" x2="101.1" y2="-22.1"  stroke="#C9A227" stroke-width="1.00"/>
    <line class="gl" x1="0" y1="155" x2="84.3"  y2="-44.3"  stroke="#C9A227" stroke-width="1.05"/>
    <line class="gl" x1="0" y1="155" x2="67.4"  y2="-66.4"  stroke="#C9A227" stroke-width="1.10"/>
    <line class="gl" x1="0" y1="155" x2="50.6"  y2="-88.6"  stroke="#C9A227" stroke-width="1.15"/>
    <line class="gl" x1="0" y1="155" x2="33.7"  y2="-110.7" stroke="#C9A227" stroke-width="1.20"/>
    <line class="gl" x1="0" y1="155" x2="16.9"  y2="-132.9" stroke="#C9A227" stroke-width="1.25"/>

    <!-- ── CENTER LINE (thickest) ── -->
    <line class="gl" x1="0" y1="155" x2="0" y2="-155" stroke="#B8962E" stroke-width="1.50"/>

    <!-- ── LEFT UPPER fan ── -->
    <line class="gl" x1="0" y1="155" x2="-16.9"  y2="-132.9" stroke="#C9A227" stroke-width="1.25"/>
    <line class="gl" x1="0" y1="155" x2="-33.7"  y2="-110.7" stroke="#C9A227" stroke-width="1.20"/>
    <line class="gl" x1="0" y1="155" x2="-50.6"  y2="-88.6"  stroke="#C9A227" stroke-width="1.15"/>
    <line class="gl" x1="0" y1="155" x2="-67.4"  y2="-66.4"  stroke="#C9A227" stroke-width="1.10"/>
    <line class="gl" x1="0" y1="155" x2="-84.3"  y2="-44.3"  stroke="#C9A227" stroke-width="1.05"/>
    <line class="gl" x1="0" y1="155" x2="-101.1" y2="-22.1"  stroke="#C9A227" stroke-width="1.00"/>

    <!-- ── LEFT LOWER fan ── -->
    <line class="gl" x1="0" y1="155" x2="-98.3"  y2="25.8"  stroke="#C9A227" stroke-width="0.94"/>
    <line class="gl" x1="0" y1="155" x2="-78.7"  y2="51.7"  stroke="#C9A227" stroke-width="0.88"/>
    <line class="gl" x1="0" y1="155" x2="-59.0"  y2="77.5"  stroke="#C9A227" stroke-width="0.82"/>
    <line class="gl" x1="0" y1="155" x2="-39.3"  y2="103.3" stroke="#C9A227" stroke-width="0.76"/>
    <line class="gl" x1="0" y1="155" x2="-19.7"  y2="129.2" stroke="#C9A227" stroke-width="0.70"/>

  </g>

  <!-- WORDMARK -->
  <text class="wm" x="250" y="418" text-anchor="middle" font-size="22" font-weight="500">STOKARA</text>
  <text class="ws" x="250" y="440" text-anchor="middle" font-size="9.5">INVENTORY MANAGEMENT</text>

</svg>
